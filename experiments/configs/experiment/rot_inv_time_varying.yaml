# @package _global_
# Experiment: Time-varying perturbation with GLOBAL rotation invariance loss
#
# Same setup as time_varying.yaml but trains with the group equivariance loss
# (Eq. 2 in the paper): L_group = ||f(g·x) - g·f(x)||² where g ~ SO(2).
# The local Lie loss (Eq. 1) is still computed and logged for comparison
# but does NOT contribute to the optimization objective.
#
# Motivation: The paper found that local Lie regularization (via Jacobians)
# was insufficient for producing consistent global symmetry, whereas the
# global group equivariance loss directly enforces the full symmetry.
#
# Usage:
#   python experiments/train.py +experiment=rot_inv_time_varying
#   python experiments/train.py +experiment=rot_inv_time_varying training.device=cuda

experiment_type: time_varying

training:
  n_epochs: 100
  patience: 15
  lr: 5e-4

dynamics:
  type: ring
  perturbation_magnitude: 0.2
  bin_sz: 0.1

# Time-varying specific settings
time_varying:
  enabled: true
  n_features: 100
  length_scale_x: 0.5
  length_scale_t: 5.0
  perturbation_seed: null

sweep:
  lambda_lie: [0.0, 5e-4, 1e-3, 2e-3, 5e-3, 1e-2, 1e-1, 1e-0]
  symmetries:
    - name: rotation_invariance
      type: rotation_invariance
      params: {n_rotations: 3, speed: 0.5}

regularization:
  lie_normalize: false
  n_rotations: 3

output:
  base_dir: results/rot_inv_time_varying
  comprehensive_analysis: true

# Forecasting evaluation settings
forecasting:
  enabled: true
  n_forecast_steps: 50
  perturbation_types:
    - name: radial
      delta_r: 0.3
    - name: strong_gp_kick
      kick_magnitude: 0.5
  n_eval_points: 100
  target_radius: 1.0
